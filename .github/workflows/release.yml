name: Build & Release

on:
  push:
    tags:
      - 'v*'
      - '[0-9]+.[0-9]+.[0-9]+'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - jdk_name: zulu-8-jfx
            distribution: zulu
            java_version: '8'
            java_package: jdk+fx

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK (${{ matrix.jdk_name }})
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java_version }}
          distribution: ${{ matrix.distribution }}
          java-package: ${{ matrix.java_package }}

      - name: Verify Java version
        run: java -version

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ matrix.jdk_name }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-${{ matrix.jdk_name }}

      - name: Build fat JAR
        run: |
          mvn clean package -DskipTests \
            -Dmaven.compiler.bootclasspath=$JAVA_HOME/jre/lib/rt.jar:$JAVA_HOME/jre/lib/jce.jar

      - name: Rename JAR with JDK info
        id: rename
        run: |
          cd target
          JAR=$(ls *-all.jar | head -1)
          BASE="${JAR%-all.jar}"
          NAMED="${BASE}-${{ matrix.jdk_name }}.jar"
          cp "$JAR" "$NAMED"
          echo "jar_name=$NAMED" >> $GITHUB_OUTPUT

      - name: Package release bundle
        id: bundle
        run: |
          mkdir -p release-bundle/lib release-bundle/data
          cp target/${{ steps.rename.outputs.jar_name }} release-bundle/
          if [ -d lib ]; then cp -r lib/. release-bundle/lib/; fi
          if [ -d data ]; then cp -r data/. release-bundle/data/; fi
          JAR_NAME="${{ steps.rename.outputs.jar_name }}"
          BASE_NAME="${JAR_NAME%.jar}"
          BUNDLE_NAME="${BASE_NAME}-bundle.zip"
          cd release-bundle
          zip -r ../$BUNDLE_NAME .
          cd ..
          echo "bundle_name=$BUNDLE_NAME" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jar-${{ matrix.jdk_name }}
          path: |
            target/${{ steps.rename.outputs.jar_name }}
            ${{ steps.bundle.outputs.bundle_name }}
          retention-days: 1

  release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all JAR artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get tag name
        id: tag
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          CURRENT_TAG=${GITHUB_REF#refs/tags/}
          PREV_TAG=$(git tag --sort=-creatordate | grep -v "^${CURRENT_TAG}$" | head -1)
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:'- %s (%h)' | head -20)
          else
            CHANGELOG=$(git log "${PREV_TAG}..${CURRENT_TAG}" --pretty=format:'- %s (%h)')
          fi
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG='- 本次更新暂无 commit 记录'
          fi
          # 写入多行输出
          {
            echo 'CHANGELOG<<EOF'
            echo "$CHANGELOG"
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.TAG }}
          name: ShiroAttack2 ${{ steps.tag.outputs.TAG }}
          body: |
            ## ShiroAttack2 ${{ steps.tag.outputs.TAG }}

            ### 更新内容

            ${{ steps.changelog.outputs.CHANGELOG }}

            ---

            > 本版本 Release 使用 **Azul Zulu 8 + JavaFX** 构建。
            > 与当前本地开发环境保持一致，便于复现和排查。

            ### 下载说明

            | 文件名 | 说明 |
            |--------|------|
            | `*-zulu-8-jfx.jar` | Azul Zulu 8 + JavaFX 单文件运行版本 |
            | `*-zulu-8-jfx-bundle.zip` | Azul Zulu 8 + JavaFX 完整压缩包，包含 jar、`lib/`、`data/` |

            ### 运行方法
            ```bash
            java -jar shiro_attack-<version>-<jdk>.jar
            ```
            > 推荐优先下载 `bundle.zip`，解压后直接运行
            > 若需自行构建，请确保仓库内 `libs/jEG-core-1.0.0.jar` 与 `libs/jmg-sdk-1.0.9.jar` 可用
          files: |
            artifacts/**/*.jar
            artifacts/**/*.zip
          draft: false
          prerelease: false
